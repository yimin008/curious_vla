### Stage 1: SFT on base model
### Usage: llamafactory-cli train sft/sft_stage1.yaml

bf16: true
dataset_dir: datasets/
dataset: QA_sft_navsim_train_cot
ddp_timeout: 180000000
deepspeed: sft/ds_z2_config.json
do_train: true
eval_steps: 100
eval_strategy: steps
finetuning_type: full
gradient_accumulation_steps: 4
image_max_pixels: 262144
learning_rate: 4.0e-05
logging_steps: 1
lr_scheduler_type: cosine
model_name_or_path: Qwen/Qwen2.5-VL-3B-Instruct # from HuggingFace
num_train_epochs: 3.0
output_dir: output/curious_vla_qwen2_5_vl_3b_sft_stage1
overwrite_cache: false
overwrite_output_dir: false
per_device_eval_batch_size: 2
per_device_train_batch_size: 4 # global batch size = per_device * grad_accum * num_gpus
plot_loss: true
preprocessing_num_workers: 32
save_steps: 2000
stage: sft
template: qwen2_vl
val_size: 0.01
warmup_ratio: 0.10
compute_accuracy: true
save_total_limit: 1
weight_decay: 0.05
report_to: tensorboard
freeze_vision_tower: true
freeze_multi_modal_projector: true
cutoff_len: 65536
